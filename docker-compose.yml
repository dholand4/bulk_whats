services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bulk_whats}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bulk_whats}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ${APP_STORAGE_ROOT:-./docker-data}/postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-bulk_whats}
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CHROME_PATH: /usr/bin/chromium
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      TZ: ${TZ:-America/Sao_Paulo}
    expose:
      - "3000"
    volumes:
      - ${APP_STORAGE_ROOT:-./docker-data}/backend/data:/app/data
      - ${APP_STORAGE_ROOT:-./docker-data}/backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
